# SIRINE Messenger bot — stack composition.
# Services: postgres (catalog DB), redis (bot memory), directus (catalog CMS),
# chatwoot rails+sidekiq (inbox + Messenger channel + AgentBot host),
# agent-handler (Gemini brain), retrieval-api (read-only get_product), seed (one-shot).
# One-command bring-up: `make setup` (see INSTALL.md). All secrets come from .env.

name: leadbot

# Chatwoot shared config — used by both the rails web and the sidekiq worker.
# DB `chatwoot` is created in M0 (POSTGRES_MULTIPLE_DATABASES). Redis is shared.
x-chatwoot-common: &chatwoot-common
  image: chatwoot/chatwoot:v4.13.0
  restart: unless-stopped
  environment:
    INSTALLATION_ENV: docker
    RAILS_ENV: production
    NODE_ENV: production
    SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
    FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3037}
    # Facebook Messenger channel (P6) — set in .env; empty until the FB app is wired.
    # Callback URL in the Meta app = ${FRONTEND_URL}/bot ; verify token = FB_VERIFY_TOKEN.
    FB_VERIFY_TOKEN: ${FB_VERIFY_TOKEN:-}
    FB_APP_ID: ${FB_APP_ID:-}
    FB_APP_SECRET: ${FB_APP_SECRET:-}
    DEFAULT_LOCALE: en
    FORCE_SSL: "false"
    ENABLE_ACCOUNT_SIGNUP: "true"   # allow the first-admin signup via UI; lock to false at hardening
    RAILS_LOG_TO_STDOUT: "true"
    LOG_LEVEL: info
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DATABASE: chatwoot
    POSTGRES_USERNAME: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    REDIS_PASSWORD: ${REDIS_PASSWORD}
  # Shared active_storage volume — rails (serves) and sidekiq (downloads inbound media) MUST
  # see the same files, or Messenger voice/image attachments 404. Also survives recreates.
  volumes:
    - chatwoot_storage:/app/storage
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_USER}
      POSTGRES_MULTIPLE_DATABASES: chatwoot,directus
      CATALOG_RO_ROLE: ${CATALOG_RO_ROLE:-catalog_ro}
      CATALOG_RO_PASSWORD: ${CATALOG_RO_PASSWORD:-catalog_ro_changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  directus:
    image: directus/directus:11.17.0
    restart: unless-stopped
    ports:
      - "8055:8055"
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: directus
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      STORAGE_LOCATIONS: local
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
    volumes:
      - directus_uploads:/directus/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8055/server/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Chatwoot — shared inbox + human handoff + AgentBot host (rails web + sidekiq worker).
  # Uses the `chatwoot` DB (created in M0) + redis. FIRST BOOT needs a one-off
  # `rails db:chatwoot_prepare` (see chatwoot/README.md). No healthcheck: CE has no
  # lightweight health endpoint — verify by loading http://localhost:3000.
  chatwoot-rails:
    <<: *chatwoot-common
    ports:
      - "3037:3000"   # host 3037 (3000 was taken) → container 3000
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    # sirine_net: agent-handler reaches chatwoot-rails via internal DNS over this
    # shared external network (see the networks section at the bottom).
    networks:
      - default
      - sirine_net

  chatwoot-sidekiq:
    <<: *chatwoot-common
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  # One-shot catalog bootstrap: Directus schema + pg_trgm GIN index + idempotent seed.
  # profiles:["tools"] keeps it OUT of `docker compose up` — runs only via `make seed`
  # (docker compose run --rm seed). node:22 is a FLOATING tag, intentionally NOT added
  # to `make verify-pins` (that gate covers only the 5 long-running pinned images).
  seed:
    image: node:22
    profiles: ["tools"]
    working_dir: /work
    command: ["sh", "run.sh"]
    volumes:
      - ./directus/seed:/work
    environment:
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      DIRECTUS_ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: directus
    depends_on:
      postgres:
        condition: service_healthy
      directus:
        condition: service_healthy

  # agent-handler — the bot brain: Chatwoot AgentBot webhook → Gemini function-calling
  # loop (get_product grounding) → Darija reply posted back to Chatwoot.
  # No host port: Chatwoot reaches it by internal DNS http://agent-handler:8082/agentbot.
  # Joins both the default network (redis, directus) and sirine_net (chatwoot-rails).
  agent-handler:
    build: ./agent-handler
    restart: unless-stopped
    environment:
      PORT: "8082"
      # LLM backend: aistudio (GEMINI_API_KEY) or vertex (Vertex AI via a service account).
      LLM_PROVIDER: ${LLM_PROVIDER:-aistudio}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
      # Vertex auth (two ways):
      #   GCP VM with an attached service account → leave this EMPTY; ADC uses the VM identity
      #     (metadata server) automatically. No key file.
      #   Non-GCP host → set GOOGLE_APPLICATION_CREDENTIALS=/app/vertex/sa.json in .env and drop the
      #     key JSON at ./agent-handler/vertex/sa.json (git-ignored, mounted read-only below).
      # Empty string = unset → google-auth-library falls back to ADC/metadata. Ignored on aistudio.
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      RETRIEVAL_API_URL: http://retrieval-api:8088
      RETRIEVAL_API_KEY: ${RETRIEVAL_API_KEY}
      # Directus assets (P6 image delivery): handler fetches product image bytes with this token
      # then uploads them to Chatwoot as real attachments (localhost asset URLs are dead for clients).
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_TOKEN: ${DIRECTUS_TOKEN}
      CHATWOOT_URL: http://chatwoot-rails:3000
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID:-1}
      CHATWOOT_AGENT_BOT_TOKEN: ${CHATWOOT_AGENT_BOT_TOKEN}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Meta webhook relay (ad attribution): verify echo + signature passthrough to Chatwoot.
      FB_VERIFY_TOKEN: ${FB_VERIFY_TOKEN:-}
    # Persona + shipping rates are volume-mounted: edit the file on the host, then
    # `docker compose restart agent-handler` — no image rebuild needed.
    volumes:
      - ./agent-handler/system-prompt.md:/app/system-prompt.md:ro
      - ./agent-handler/shipping.json:/app/shipping.json:ro
      # Directory mount (always exists, even empty) so aistudio installs don't break on a missing
      # file. For vertex, place the key at ./agent-handler/vertex/sa.json (git-ignored).
      - ./agent-handler/vertex:/app/vertex:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8082/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default
      - sirine_net

  # retrieval-api — read-only catalog grounding (get_product) over the catalog_ro role.
  # The agent's only data path to product facts (anti-hallucination). No cache (TTL=0).
  retrieval-api:
    build: ./retrieval-api
    restart: unless-stopped
    ports:
      - "8137:8088"   # host 8137 (8088 was taken) → container 8088
    environment:
      PORT: "8088"
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${CATALOG_RO_ROLE:-catalog_ro}
      PGPASSWORD: ${CATALOG_RO_PASSWORD}
      PGDATABASE: directus
      RETRIEVAL_API_KEY: ${RETRIEVAL_API_KEY}
      DIRECTUS_PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8088/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default
      - sirine_net

  # caddy — OPTIONAL edge proxy (profile "edge", enabled automatically by `make setup`
  # when FRONTEND_URL is a real https domain). Terminates TLS (auto Let's Encrypt) and
  # routes /meta/webhook → agent-handler (ad attribution relay), everything else → Chatwoot.
  caddy:
    image: caddy:2.8-alpine
    profiles: ["edge"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - chatwoot-rails
      - agent-handler

volumes:
  pg_data:
  redis_data:
  directus_uploads:
  chatwoot_storage:
  caddy_data:
  caddy_config:

# =============================================================================
# Networks
# sirine_net is a shared EXTERNAL network (created once by bootstrap:
# docker network create sirine_net). Only chatwoot-rails, agent-handler and
# retrieval-api join it; postgres/redis/directus stay on the default network.
# =============================================================================
networks:
  sirine_net:
    external: true
